<!DOCTYPE html>
<html lang="ar" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X & O Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- THEME TOGGLE -->
  <button class="theme-toggle" id="themeToggle" title="تغيير المود">
    <span class="sun">☀️</span>
    <span class="moon">🌙</span>
  </button>

  <div class="container">

    <!-- CARD -->
    <div class="card">

      <!-- HEADER -->
      <div class="header">
        <div class="logo">
          <span class="logo-x">X</span>
          <span class="logo-amp">&</span>
          <span class="logo-o">O</span>
        </div>
        <p class="subtitle">خليك تكسب لو قدرت 😏</p>
      </div>

      <!-- MODE SELECTOR -->
      <div class="mode-selector">
        <button class="mode-btn active" id="btnVsAI">
          <span class="mode-icon">🤖</span>
          <span>ضد الكمبيوتر</span>
        </button>
        <button class="mode-btn" id="btnVsHuman">
          <span class="mode-icon">👥</span>
          <span>لاعبان</span>
        </button>
      </div>

      <!-- STATUS -->
      <div class="status-bar">
        <div class="status-pill" id="statusPill">
          <span id="statusText">دورك — أنت X</span>
        </div>
      </div>

      <!-- BOARD -->
      <div class="board" id="board">
        <button class="cell" data-i="0"></button>
        <button class="cell" data-i="1"></button>
        <button class="cell" data-i="2"></button>
        <button class="cell" data-i="3"></button>
        <button class="cell" data-i="4"></button>
        <button class="cell" data-i="5"></button>
        <button class="cell" data-i="6"></button>
        <button class="cell" data-i="7"></button>
        <button class="cell" data-i="8"></button>
      </div>

      <!-- SCOREBOARD -->
      <div class="scoreboard">
        <div class="score-item score-x">
          <span class="score-player" id="xLabel">X — أنت</span>
          <span class="score-num" id="scoreX">0</span>
          <span class="score-tag">فوز</span>
        </div>
        <div class="score-divider">
          <div class="divider-line"></div>
          <span class="vs-text">VS</span>
          <div class="divider-line"></div>
        </div>
        <div class="score-item score-o">
          <span class="score-player" id="oLabel">O — كمبيوتر</span>
          <span class="score-num" id="scoreO">0</span>
          <span class="score-tag">فوز</span>
        </div>
      </div>

      <!-- BUTTONS -->
      <div class="btn-row">
        <button class="btn btn-primary" id="btnNew">🔄 جولة جديدة</button>
        <button class="btn btn-secondary" id="btnReset">🗑️ مسح</button>
      </div>

    </div>
  </div>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay">
    <div class="overlay-card">
      <div class="overlay-emoji" id="overlayEmoji">🎉</div>
      <h2 class="overlay-title" id="overlayTitle">فزت!</h2>
      <p class="overlay-msg" id="overlayMsg">أنت أحسن واحد</p>
      <button class="btn btn-primary overlay-btn" id="btnOverlayClose">
        🔄 جولة جديدة
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
